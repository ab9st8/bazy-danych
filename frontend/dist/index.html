<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Rezerwacji Biletów</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ececec;
            --panel: #ffffff;
            --border: #bdbdbd;
            --border-strong: #8c8c8c;
            --text-main: #1a1a1a;
            --text-muted: #5a5a5a;
            --row-hover: #f1f3f7;

            --accent-info: #1d3a8a;
            --accent-success: #1f6b1f;
            --accent-warning: #8a5a00;
            --accent-danger: #8a1f1f;

            --tint-success: #e8f3e8;
            --tint-warning: #f3ecda;
            --tint-danger: #efe0e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Source Sans 3', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            padding: 1.5rem 1rem;
            line-height: 1.45;
            font-size: 14px;
        }

        code, .mono { font-family: 'Source Code Pro', monospace; }

        h1, h2, h3, h4 { font-weight: 700; }
        h1 { font-size: 1.4rem; }
        h2 { font-size: 1rem; }
        h3 { font-size: 1rem; }
        h4 { font-size: 0.95rem; }

        .container { max-width: 1100px; margin: 0 auto; }

        /* Generic panel: a plain bordered box. The legacy `glass-card` name is kept
           so existing markup keeps working. */
        .glass-card {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 1rem;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            flex-wrap: wrap;
            padding-bottom: 0.75rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-strong);
        }

        .brand p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 0.15rem;
        }

        .user-panel {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.6rem;
            flex-wrap: wrap;
        }

        .user-id-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            font-weight: 700;
        }

        .input-text {
            background: #fff;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.35rem 0.5rem;
            font-family: 'Source Code Pro', monospace;
            font-size: 0.8rem;
            outline: none;
            width: 280px;
            min-width: 0;
        }
        .input-text:focus { border-color: var(--accent-info); }

        /* Buttons */
        .btn {
            background: #f5f5f5;
            color: var(--text-main);
            border: 1px solid var(--border-strong);
            padding: 0.35rem 0.9rem;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }
        .btn:hover { background: #e5e7ea; }
        .btn:active { background: #d6d8db; }
        .btn:disabled { opacity: 0.55; cursor: not-allowed; }

        .btn-secondary { /* same as default */ }

        .btn-success {
            background: var(--tint-success);
            color: var(--accent-success);
            border-color: var(--accent-success);
        }
        .btn-success:hover { background: #d3e6d3; }

        /* Dashboard */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 1rem;
            align-items: start;
        }
        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        /* Event list — rows separated by hairlines, no gap */
        .event-list { display: flex; flex-direction: column; }
        .event-list h2 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            padding: 0.25rem 0 0.5rem;
        }
        .event-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-bottom: none;
            padding: 0.6rem 0.75rem;
            cursor: pointer;
        }
        .event-card:last-child { border-bottom: 1px solid var(--border); }
        .event-card:hover { background: var(--row-hover); }
        .event-card.active {
            background: var(--row-hover);
            border-left: 3px solid var(--accent-info);
            padding-left: calc(0.75rem - 2px);
        }
        .event-card h3 { font-size: 0.95rem; margin-bottom: 0.1rem; }
        .event-venue,
        .event-date { font-size: 0.78rem; color: var(--text-muted); }

        .status-badge {
            display: inline-block;
            padding: 0.05rem 0.4rem;
            font-size: 0.72rem;
            font-weight: 600;
            border: 1px solid;
            margin-right: 0.25rem;
            margin-top: 0.3rem;
        }
        .badge-available { color: var(--accent-success); border-color: var(--accent-success); }
        .badge-held { color: var(--accent-warning); border-color: var(--accent-warning); }
        .badge-sold { color: var(--text-muted); border-color: var(--border-strong); }
        .badge-waitlist { color: var(--accent-info); border-color: var(--accent-info); }

        /* Detail panel */
        .detail-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Action bar */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .action-info h4 { margin-bottom: 0.1rem; }
        .action-info p { font-size: 0.82rem; color: var(--text-muted); }

        /* Hold banner */
        .hold-banner {
            background: var(--panel);
            border: 1px solid var(--accent-info);
            padding: 0.85rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .hold-time-wrapper { display: flex; align-items: center; gap: 0.75rem; }
        .hold-time {
            font-family: 'Source Code Pro', monospace;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent-info);
            letter-spacing: 0.04em;
        }

        /* Waitlist banner */
        .waitlist-banner {
            background: var(--panel);
            border: 1px solid var(--accent-warning);
            padding: 0.85rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        /* Seat map */
        .seat-map-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .seat-legends {
            display: flex;
            gap: 0.75rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            flex-wrap: wrap;
        }
        .legend-item { display: flex; align-items: center; gap: 0.35rem; }
        .legend-dot {
            width: 0.7rem;
            height: 0.7rem;
            border: 1px solid;
        }
        .dot-available  { background: var(--tint-success); border-color: var(--accent-success); }
        .dot-held       { background: var(--tint-warning); border-color: var(--accent-warning); }
        .dot-held-by-me { background: var(--accent-info);  border-color: var(--accent-info); }
        .dot-sold       { background: var(--tint-danger);  border-color: var(--accent-danger); }

        .seat-grid-container {
            max-height: 480px;
            overflow-y: auto;
        }
        .seat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
            gap: 4px;
        }
        .seat {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Source Code Pro', monospace;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid;
            user-select: none;
        }
        .seat-available  { background: var(--tint-success); color: var(--accent-success); border-color: var(--accent-success); }
        .seat-available:hover { background: var(--accent-success); color: #fff; }
        .seat-held       { background: var(--tint-warning); color: var(--accent-warning); border-color: var(--accent-warning); cursor: not-allowed; }
        .seat-held-by-me { background: var(--accent-info); color: #fff; border-color: var(--accent-info); }
        .seat-sold       { background: var(--tint-danger); color: var(--accent-danger); border-color: var(--accent-danger); cursor: not-allowed; }

        /* Toasts */
        .toast-container {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 1000;
            max-width: 360px;
        }
        .toast {
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.6rem 0.85rem;
            font-size: 0.85rem;
        }
        .toast-success { border-left: 4px solid var(--accent-success); }
        .toast-error   { border-left: 4px solid var(--accent-danger); }
        .toast-warning { border-left: 4px solid var(--accent-warning); }

        /* Spinner (used inside buttons) */
        .spinner {
            border: 2px solid rgba(0, 0, 0, 0.15);
            border-left-color: currentColor;
            width: 0.9rem;
            height: 0.9rem;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
