<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Rezerwacji Biletów</title>
    
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #070a13;
            --bg-card: rgba(15, 23, 42, 0.65);
            --bg-card-hover: rgba(30, 41, 59, 0.8);
            --border-glow: rgba(99, 102, 241, 0.15);
            --border-soft: rgba(255, 255, 255, 0.06);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --accent-primary: #6366f1; /* Indigo */
            --accent-primary-glow: rgba(99, 102, 241, 0.4);
            --accent-success: #10b981; /* Emerald */
            --accent-warning: #f59e0b; /* Amber */
            --accent-danger: #ef4444; /* Rose */
            --accent-info: #06b6d4; /* Cyan */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.12) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            line-height: 1.5;
        }

        h1, h2, h3, h4 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* Glassmorphism card utility */
        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-soft);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            border-color: var(--border-glow);
            box-shadow: 0 8px 32px 0 rgba(99, 102, 241, 0.08);
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .brand h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 50%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(99, 102, 241, 0.15);
        }

        .brand p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 0.25rem;
        }

        /* User Identity Panel */
        .user-panel {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .input-text {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border-soft);
            color: var(--text-main);
            padding: 0.6rem 1rem;
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            width: 280px;
            transition: all 0.2s;
        }

        .input-text:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px var(--accent-primary-glow);
        }

        .btn {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: none;
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-success:hover {
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
        }

        /* Dashboard Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            align-items: start;
        }

        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Event list card */
        .event-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .event-card {
            cursor: pointer;
            border-left: 4px solid transparent;
        }

        .event-card.active {
            border-left-color: var(--accent-primary);
            background: var(--bg-card-hover);
        }

        .event-card h3 {
            font-size: 1.15rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .event-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }

        .event-meta span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .status-badge {
            padding: 0.2rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-available { background: rgba(16, 185, 129, 0.15); color: var(--accent-success); }
        .badge-held { background: rgba(245, 158, 11, 0.15); color: var(--accent-warning); }
        .badge-sold { background: rgba(239, 68, 68, 0.15); color: var(--accent-danger); }
        .badge-waitlist { background: rgba(6, 182, 212, 0.15); color: var(--accent-info); }

        /* Stats in event cards */
        .event-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            text-align: center;
            border-top: 1px solid var(--border-soft);
            padding-top: 0.75rem;
            margin-top: 0.5rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-val {
            font-size: 0.95rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
        }

        .stat-lbl {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Detail Panel */
        .detail-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Action bar for Reservation / Waitlist */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(30, 41, 59, 0.4);
            border-radius: 0.75rem;
            border: 1px solid var(--border-soft);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .action-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .action-info h4 {
            font-size: 1rem;
        }

        .action-info p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Hold Timer Overlay / Toast */
        .hold-banner {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.2) 0%, rgba(99, 102, 241, 0.2) 100%);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 0.75rem;
            padding: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: pulse-border 2s infinite ease-in-out;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .hold-time-wrapper {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .timer-icon {
            font-size: 1.5rem;
            animation: rotate-shake 1.5s infinite;
        }

        .hold-time {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent-info);
            letter-spacing: 0.05em;
        }

        /* Waitlist Banner */
        .waitlist-banner {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.25);
            border-radius: 0.75rem;
            padding: 1rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--text-main);
            flex-wrap: wrap;
            gap: 1rem;
        }

        /* Seat Grid styling */
        .seat-map-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .seat-legends {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .legend-dot {
            width: 0.75rem;
            height: 0.75rem;
            border-radius: 0.15rem;
        }

        .dot-available { background-color: var(--accent-success); box-shadow: 0 0 6px var(--accent-success); }
        .dot-held { background-color: var(--accent-warning); }
        .dot-held-by-me { background-color: var(--accent-info); box-shadow: 0 0 8px var(--accent-info); animation: pulse-glow 1.5s infinite; }
        .dot-sold { background-color: var(--accent-danger); }

        .seat-grid-container {
            max-height: 480px;
            overflow-y: auto;
            padding-right: 0.5rem;
            margin-top: 1rem;
        }

        /* Custom scrollbar */
        .seat-grid-container::-webkit-scrollbar {
            width: 6px;
        }
        .seat-grid-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 3px;
        }
        .seat-grid-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .seat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
            gap: 0.45rem;
        }

        .seat {
            aspect-ratio: 1;
            border-radius: 0.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            border: 1px solid transparent;
        }

        .seat-available {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
            color: var(--accent-success);
        }

        .seat-available:hover {
            background: var(--accent-success);
            color: var(--bg-dark);
            box-shadow: 0 0 12px var(--accent-success);
            transform: scale(1.1);
        }

        .seat-held {
            background: rgba(245, 158, 11, 0.15);
            border-color: rgba(245, 158, 11, 0.3);
            color: var(--accent-warning);
            cursor: not-allowed;
        }

        .seat-held-by-me {
            background: var(--accent-info);
            color: var(--bg-dark);
            box-shadow: 0 0 12px var(--accent-info);
            border-color: #e0f2fe;
            animation: pulse-glow 1.5s infinite;
        }

        .seat-held-by-me:hover {
            transform: scale(1.1);
        }

        .seat-sold {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.25);
            color: var(--accent-danger);
            cursor: not-allowed;
        }

        /* Animations */
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 6px var(--accent-info); }
            50% { box-shadow: 0 0 16px var(--accent-info); }
            100% { box-shadow: 0 0 6px var(--accent-info); }
        }

        @keyframes pulse-border {
            0% { border-color: rgba(99, 102, 241, 0.3); box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37); }
            50% { border-color: rgba(6, 182, 212, 0.7); box-shadow: 0 8px 32px 0 rgba(6, 182, 212, 0.15); }
            100% { border-color: rgba(99, 102, 241, 0.3); box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37); }
        }

        @keyframes rotate-shake {
            0% { transform: rotate(0); }
            15% { transform: rotate(5deg); }
            30% { transform: rotate(-5deg); }
            45% { transform: rotate(4deg); }
            60% { transform: rotate(-4deg); }
            75% { transform: rotate(2deg); }
            85% { transform: rotate(-2deg); }
            100% { transform: rotate(0); }
        }

        /* Toast notifications */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            z-index: 1000;
            max-width: 350px;
        }

        .toast {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--border-soft);
            color: var(--text-main);
            padding: 1rem 1.25rem;
            border-radius: 0.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slide-in 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(8px);
        }

        .toast-success { border-left: 4px solid var(--accent-success); }
        .toast-error { border-left: 4px solid var(--accent-danger); }
        .toast-warning { border-left: 4px solid var(--accent-warning); }

        @keyframes slide-in {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Loading Spinner */
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.1);
            width: 1.2rem;
            height: 1.2rem;
            border-radius: 50%;
            border-left-color: var(--text-main);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .muted-text {
            color: var(--text-muted);
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div id="app" class="container"></div>
</body>
</html>
